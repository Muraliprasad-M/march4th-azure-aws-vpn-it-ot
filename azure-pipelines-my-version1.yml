
trigger:
  branches:
    include:
      - main

variables:
  - name: TF_VERSION
    value: '1.14.5'
  - name: TFLINT_VERSION
    value: '0.53.0'
  - name: WORKING_DIR
    value: 'infra'
  # Backend settings
  - name: TF_BACKEND_BUCKET
    value: 'st-network-prod-euw2-tfstate-eyqwgt'
  - name: TF_BACKEND_KEY
    value: 'core-network/terraform.tfstate'
  - name: TF_BACKEND_DDB_TABLE
    value: 'st-network-prod-euw2-tfstate-lock'
  - name: AWS_SERVICE_CONNECTION
    value: 'aws-core-network'
  - name: ROLE_ARN
    value: 'arn:aws:iam::732822664028:role/TerraformExecutionRole'
  - name: AWS_DEFAULT_REGION
    value: 'eu-west-2'

resources:
  repositories:
    - repository: templates
      type: git
      name: YourProject/pipeline-templates  # Update with your actual project/repo name

stages:
# ==========================================
# VALIDATION STAGE
# ==========================================
- stage: Validate
  displayName: 'Code Validation'
  jobs:
    - job: CodeValidation
      steps:
        - template: stages/code-validation-stage.yml@templates

# ==========================================
# TERRAFORM PLAN STAGE
# ==========================================
- stage: Plan
  displayName: 'Terraform Plan'
  dependsOn: Validate
  condition: succeeded()
  jobs:
    - job: TerraformPlan
      steps:
        - template: stages/terraform-plan-stage.yml@templates
          parameters:
            tfStateBucket: 'st-network-prod-euw2-tfstate-eyqwgt'
            tfStateKey: 'core-network/terraform.tfstate'
            tfStateLock: 'st-network-prod-euw2-tfstate-lock'
            awsServiceConnection: 'aws-core-network'
            roleArn: 'arn:aws:iam::732822664028:role/TerraformExecutionRole'

# ==========================================
# TERRAFORM APPLY STAGE
# ==========================================
- stage: Apply
  displayName: 'Terraform Apply'
  dependsOn: Plan
  jobs:
    - deployment: ApplyDeployment
      displayName: "Run terraform apply"
      environment: 'ManualApply'
      condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'main'))
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
              - template: stages/terraform-apply-stage.yml@templates
                parameters:
                  tfStateBucket: 'st-network-prod-euw2-tfstate-eyqwgt'
                  tfStateKey: 'core-network/terraform.tfstate'
                  tfStateLock: 'st-network-prod-euw2-tfstate-lock'
                  awsServiceConnection: 'aws-core-network'
                  roleArn: 'arn:aws:iam::732822664028:role/TerraformExecutionRole'
