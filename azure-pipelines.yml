
trigger:
  branches:
    include:
      - main

variables:
  - name: TF_VERSION
    value: '1.14.5'
  - name: TFLINT_VERSION
    value: '0.53.0'
  - name: WORKING_DIR
    value: 'infra'
  - name: TF_BACKEND_BUCKET
    value: 'st-network-prod-euw2-tfstate-eyqwgt'
  - name: TF_BACKEND_KEY
    value: 'core-network/terraform.tfstate'
  - name: TF_BACKEND_DDB_TABLE
    value: 'st-network-prod-euw2-tfstate-lock'
  - name: AWS_SERVICE_CONNECTION
    value: 'aws-core-network'
  - name: ROLE_ARN
    value: 'arn:aws:iam::732822664028:role/TerraformExecutionRole'
  - name: AWS_DEFAULT_REGION
    value: 'eu-west-2'

stages:
- stage: Validate
  displayName: 'Code Validation'
  jobs:
    - job: CodeValidation
      displayName: 'Validate Terraform'
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - checkout: self
        
        - task: AWSShellScript@1
          inputs:
            awsCredentials: '$(AWS_SERVICE_CONNECTION)'
            regionName: '$(AWS_DEFAULT_REGION)'
            scriptType: 'inline'
            inlineScript: |
              curl -fsSL -o terraform.zip https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
              sudo unzip -o terraform.zip -d /usr/local/bin
              terraform version
              
              cd $(WORKING_DIR)
              terraform fmt -check -recursive || true
              
              terraform init \
                -backend-config="bucket=$(TF_BACKEND_BUCKET)" \
                -backend-config="key=$(TF_BACKEND_KEY)" \
                -backend-config="region=$(AWS_DEFAULT_REGION)" \
                -backend-config="dynamodb_table=$(TF_BACKEND_DDB_TABLE)" \
                -input=false
              terraform validate
          displayName: 'Terraform Validate'

- stage: Plan
  displayName: 'Terraform Plan'
  dependsOn: Validate
  condition: succeeded()
  jobs:
    - job: TerraformPlan
      displayName: 'Plan Infrastructure'
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - checkout: self
        
        - task: AWSShellScript@1
          inputs:
            awsCredentials: '$(AWS_SERVICE_CONNECTION)'
            regionName: '$(AWS_DEFAULT_REGION)'
            scriptType: 'inline'
            inlineScript: |
              curl -fsSL -o terraform.zip https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
              sudo unzip -o terraform.zip -d /usr/local/bin
              terraform version
              
              cd $(WORKING_DIR)
              terraform init \
                -backend-config="bucket=$(TF_BACKEND_BUCKET)" \
                -backend-config="key=$(TF_BACKEND_KEY)" \
                -backend-config="region=$(AWS_DEFAULT_REGION)" \
                -backend-config="dynamodb_table=$(TF_BACKEND_DDB_TABLE)" \
                -input=false
              
              terraform plan \
                -out="$(Build.ArtifactStagingDirectory)/plan.tfplan" \
                -input=false
              
              terraform show -no-color "$(Build.ArtifactStagingDirectory)/plan.tfplan" > "$(Build.ArtifactStagingDirectory)/plan.txt"
          displayName: 'Terraform Plan'
        
        - task: PublishBuildArtifacts@1
          inputs:
            pathToPublish: '$(Build.ArtifactStagingDirectory)'
            artifactName: 'terraform-plan'
            publishLocation: 'Container'
          displayName: 'Publish Plan Artifacts'

- stage: Apply
  displayName: 'Terraform Apply'
  dependsOn: Plan
  condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'main'))
  jobs:
    - deployment: ApplyDeployment
      displayName: 'Apply Infrastructure'
      environment: 'ManualApply'
      pool:
        vmImage: 'ubuntu-latest'
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
              
              - task: DownloadBuildArtifacts@1
                inputs:
                  buildType: 'current'
                  downloadType: 'single'
                  artifactName: 'terraform-plan'
                  downloadPath: '$(Pipeline.Workspace)'
                displayName: 'Download Plan Artifact'
              
              - task: AWSShellScript@1
                inputs:
                  awsCredentials: '$(AWS_SERVICE_CONNECTION)'
                  regionName: '$(AWS_DEFAULT_REGION)'
                  scriptType: 'inline'
                  inlineScript: |
                    curl -fsSL -o terraform.zip https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
                    sudo unzip -o terraform.zip -d /usr/local/bin
                    terraform version
                    
                    cd $(WORKING_DIR)
                    terraform init \
                      -backend-config="bucket=$(TF_BACKEND_BUCKET)" \
                      -backend-config="key=$(TF_BACKEND_KEY)" \
                      -backend-config="region=$(AWS_DEFAULT_REGION)" \
                      -backend-config="dynamodb_table=$(TF_BACKEND_DDB_TABLE)" \
                      -input=false
                    
                    terraform apply -input=false "$(Pipeline.Workspace)/terraform-plan/plan.tfplan"
                    
                    terraform output -json > "$(Build.ArtifactStagingDirectory)/terraform-outputs.json"
                displayName: 'Terraform Apply'
              
              - task: PublishBuildArtifacts@1
                inputs:
                  pathToPublish: '$(Build.ArtifactStagingDirectory)'
                  artifactName: 'terraform-outputs'
                  publishLocation: 'Container'
                displayName: 'Publish Outputs'
