
trigger:
  branches:
    include:
      - main

variables:
  - name: TF_VERSION
    value: '1.14.5'
  - name: TFLINT_VERSION
    value: '0.53.0'
  - name: WORKING_DIR
    value: 'infra'
  # Backend settings
  - name: TF_BACKEND_BUCKET
    value: 'st-network-prod-euw2-tfstate-eyqwgt'
  - name: TF_BACKEND_KEY
    value: 'core-network/terraform.tfstate'
  - name: TF_BACKEND_DDB_TABLE
    value: 'st-network-prod-euw2-tfstate-lock'
  - name: AWS_SERVICE_CONNECTION
    value: 'aws-core-network'
  - name: ROLE_ARN
    value: 'arn:aws:iam::732822664028:role/TerraformExecutionRole'
  - name: AWS_DEFAULT_REGION
    value: 'eu-west-2'

stages:
- stage: Validate
  displayName: 'Terraform Validate'
  jobs:
  - job: LintAndValidate
    displayName: 'Lint and validate'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self

    - script: |
        set -e
        echo "Installing Terraform $(TF_VERSION)"
        curl -fsSL -o terraform.zip https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
        sudo unzip -o terraform.zip -d /usr/local/bin
        terraform version

        echo "Installing tflint $(TFLINT_VERSION)"
        curl -fsSL -o tflint.zip https://github.com/terraform-linters/tflint/releases/download/v$(TFLINT_VERSION)/tflint_linux_amd64.zip
        sudo unzip -o tflint.zip -d /usr/local/bin
        tflint --version
      displayName: 'Install Terraform and TFLint'

    - script: |
        set -e
        cd $(WORKING_DIR)
        terraform fmt -check -recursive
        export TFLINT_PLUGIN_AWS_REGION="${AWS_DEFAULT_REGION}"
        tflint --init
        tflint -f sarif -o $(Build.ArtifactStagingDirectory)/tflint.sarif .
      displayName: 'Terraform fmt & TFLint'

    - script: |
        set -e
        cd $(WORKING_DIR)
        terraform init \
          -backend-config="bucket=$(TF_BACKEND_BUCKET)" \
          -backend-config="key=$(TF_BACKEND_KEY)" \
          -backend-config="region=$(AWS_DEFAULT_REGION)" \
          -backend-config="dynamodb_table=$(TF_BACKEND_DDB_TABLE)" \
          -input=false
        terraform validate
      displayName: 'Terraform init & validate'

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/tflint.sarif'
        artifactName: 'lint'
        publishLocation: 'Container'
      displayName: 'Publish lint artifacts'

- stage: Plan
  displayName: 'Terraform Plan (OT & IT)'
  dependsOn: Validate
  jobs:
  - job: Plan
    displayName: 'Plan OT & IT'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self
    
    - script: |
        set -e
        curl -fsSL -o terraform.zip https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
        sudo unzip -o terraform.zip -d /usr/local/bin
        terraform version
      displayName: 'Install Terraform'
    
    - script: |
        set -e
        cd $(WORKING_DIR)
        terraform init \
          -backend-config="bucket=$(TF_BACKEND_BUCKET)" \
          -backend-config="key=$(TF_BACKEND_KEY)" \
          -backend-config="region=$(AWS_DEFAULT_REGION)" \
          -backend-config="dynamodb_table=$(TF_BACKEND_DDB_TABLE)" \
          -input=false

        terraform plan \
          -out="$(Build.ArtifactStagingDirectory)/plan.tfplan" \
          -input=false

        terraform show -no-color "$(Build.ArtifactStagingDirectory)/plan.tfplan" > "$(Build.ArtifactStagingDirectory)/plan.txt"
      displayName: 'Terraform init & plan'
    
    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'plan'
        publishLocation: 'Container'
      displayName: 'Publish plan artifacts'

- stage: Approval
  displayName: 'Manual Approval'
  dependsOn: Plan
  jobs:
  - job: WaitForApproval
    displayName: 'Manual Validation'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: ManualValidation@0
      inputs:
        instructions: |
          Review the Terraform plan (plan.txt) and approve to apply to PROD.
          This will deploy both OT and IT VPN connections.
        onTimeout: 'reject'
        timeout: '43200'
      displayName: 'Await approval'

- stage: Apply
  displayName: 'Terraform Apply (OT & IT)'
  dependsOn: Approval
  condition: succeeded()
  jobs:
  - job: Apply
    displayName: 'Apply OT & IT'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self
    
    - task: DownloadBuildArtifacts@1
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'plan'
        downloadPath: '$(Pipeline.Workspace)'
      displayName: 'Download plan artifact'
    
    - script: |
        set -e
        curl -fsSL -o terraform.zip https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
        sudo unzip -o terraform.zip -d /usr/local/bin
        terraform version
      displayName: 'Install Terraform'
    
    - script: |
        set -e
        cd $(WORKING_DIR)
        terraform init \
          -backend-config="bucket=$(TF_BACKEND_BUCKET)" \
          -backend-config="key=$(TF_BACKEND_KEY)" \
          -backend-config="region=$(AWS_DEFAULT_REGION)" \
          -backend-config="dynamodb_table=$(TF_BACKEND_DDB_TABLE)" \
          -input=false

        terraform apply -input=false "$(Pipeline.Workspace)/plan/plan.tfplan"

        terraform output -json > "$(Build.ArtifactStagingDirectory)/terraform-outputs.json"
      displayName: 'Terraform init & apply'
    
    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'apply-outputs'
        publishLocation: 'Container'
      displayName: 'Publish apply artifacts'
